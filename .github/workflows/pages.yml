name: Deploy to GitHub Pages

# Publishes the static Agentwerke marketing site (agentwerke.de) to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://agentwerke.de/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare static artifact
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp index.html CNAME robots.txt sitemap.xml .pages/
          cp -R assets .pages/assets
          find .pages -maxdepth 3 -type f | sort
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Static site — no build step. Upload only files meant for production.
          path: .pages
      - name: Wait for Pages artifact propagation
        run: sleep 30
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 600000
          error_count: 20
          reporting_interval: 10000
      - name: Wait before retrying Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 600000
          error_count: 20
          reporting_interval: 10000
      - name: Fail if Pages deployment failed twice
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed twice after the artifact was accepted."
          exit 1
